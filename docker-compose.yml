x-logging:
    &default-logging
    driver: "json-file"
    options:
        max-size: "10m"
        max-file: "3"

services:
   tvheadend:
      build: 
        context: ./tvheadend
        target: tvheadendruntime
      container_name: tvheadend
      image: tgiesela/tvheadend:v0.5
      hostname: tvheadend
      domainname: thuis.local
      ports:
         - "9981:9981/tcp"   # web
         - "9982:9982/tcp"   # smtp-auth
         - "9981:9981/udp"   # web
         - "9982:9982/udp"   # smtp-auth
      privileged: true
      volumes:
        - ${TVHEADEND_CONFIG:-/docer/data/tvheadend}:/config
        - ${RECORDINGS:-/mnt/recordings}:/recordings
        - /dev/bus/usb:/dev/bus/usb
        - /dev/dvb:/dev/dvb
#      network_mode: "host"
      depends_on: 
        - "oscam"
      environment:
        - TZ=${TZ}
      restart: always
      logging: *default-logging

   oscam:
      build: 
        context: ./oscam
        target: oscamruntime
      container_name: oscam
      image: tgiesela/oscam:v0.1
      hostname: oscam
      domainname: thuis.local
      ports:
         - "9000:9000"   # oscam dvb
         - "8888:8888"   # web gui
#      privileged: true
      volumes:
        - /dev/bus/usb:/dev/bus/usb
#      network_mode: "host"
      environment:
        - TZ=${TZ}
      restart: always
      logging: *default-logging


